name: Fixtures

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  fixtures:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check generated fixtures are up to date
      run: npm run fixtures:check
