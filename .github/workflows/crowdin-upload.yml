name: i18n - Upload Translations

# Push local translation edits (e.g. review fixes) up to Crowdin whenever
# translation manifests change on main, so Crowdin reflects the repo's values
# instead of reverting them on the next sync download.
#
# Sources are uploaded first so translations for newly added keys attach.
#
# Secrets: CROWDIN_PROJECT_ID, CROWDIN_PERSONAL_TOKEN

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - src/assets/locales/**
      - '!src/assets/locales/en-US/**'

permissions:
  contents: read

concurrency:
  group: i18n-crowdin-sync
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Upload sources to Crowdin
      uses: crowdin/github-action@v2
      with:
        upload_sources: true
        upload_translations: false
        download_translations: false
        create_pull_request: false
        push_translations: false
      env:
        CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
        CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

    - name: Upload translations to Crowdin
      uses: crowdin/github-action@v2
      with:
        command: upload translations
      env:
        CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
        CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
