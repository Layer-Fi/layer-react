name: i18n - Sync French Translations

# When English source strings change on main, push them to Crowdin, run fr-CA
# pre-translation, download the result, and open/update the French translations PR.
# Manual runs default to download-only for pulling upstream Crowdin translation edits.
# The merge helper keeps the PR scoped to existing fr-CA keys so Crowdin exports
# cannot introduce new French manifest keys.

on:
  workflow_dispatch:
    inputs:
      pretranslate:
        description: Upload English sources and run fr-CA pretranslation before downloading
        required: true
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - src/assets/locales/en-US/**

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n-french-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Upload sources to Crowdin
      if: ${{ github.event_name == 'push' || inputs.pretranslate }}
      uses: crowdin/github-action@v2
      with:
        upload_sources: true
        upload_translations: false
        download_translations: false
        create_pull_request: false
        push_translations: false
      env:
        CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
        CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

    - name: Pre-translate fr-CA from translation memory
      if: ${{ github.event_name == 'push' || inputs.pretranslate }}
      uses: crowdin/github-action@v2
      with:
        command: pre-translate
        command_args: -l fr-CA --method tm --translate-untranslated-only
      env:
        CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
        CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

    - name: Pre-translate fr-CA with AI
      if: ${{ (github.event_name == 'push' || inputs.pretranslate) && vars.CROWDIN_AI_PROMPT_ID != '' }}
      uses: crowdin/github-action@v2
      with:
        command: pre-translate
        command_args: -l fr-CA --method ai --ai-prompt ${{ vars.CROWDIN_AI_PROMPT_ID }} --translate-untranslated-only
      env:
        CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
        CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

    - name: Snapshot current fr-CA manifest
      run: cp -R src/assets/locales/fr-CA "$RUNNER_TEMP/fr-CA-before-crowdin"

    - name: Download fr-CA translations
      uses: crowdin/github-action@v2
      with:
        upload_sources: false
        upload_translations: false
        download_translations: true
        download_language: fr-CA
        skip_untranslated_strings: true
        create_pull_request: false
        push_translations: false
      env:
        CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
        CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

    - name: Keep existing fr-CA keys only
      run: node scripts/i18next/mergeExistingTranslations.mjs "$RUNNER_TEMP/fr-CA-before-crowdin" src/assets/locales/fr-CA

    - name: Open French translations PR
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        git add src/assets/locales/fr-CA
        if git diff --cached --quiet; then
          echo "No new fr-CA translations."
          exit 0
        fi
        BR=i18n/crowdin-fr-ca
        VERSION=$(node -p "require('./package.json').version")
        git checkout -B "$BR"
        git commit -m "i18n: update fr-CA translations"
        git push -f origin "$BR"
        if [ -z "$(gh pr list --head "$BR" --state open --json number --jq '.[0].number // empty')" ]; then
          gh pr create --base main --head "$BR" \
            --title "i18n: update fr-CA translations for v$VERSION" \
            --body "Downloaded new fr-CA translations from Crowdin for @layerfi/components v$VERSION."
        fi
