name: Build

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run build
      run: npm run build

    - name: Validate build artifacts
      run: |
        # Assert every entrypoint declared in package.json exists and is non-empty.
        artifacts=(
          dist/cjs/index.cjs   # main / require
          dist/esm/index.mjs   # module / import
          dist/index.d.ts      # types
          dist/index.css       # style / ./index.css export
        )
        missing=0
        for f in "${artifacts[@]}"; do
          if [ ! -s "$f" ]; then
            echo "::error::Missing or empty build artifact: $f"
            missing=1
          fi
        done
        if [ "$missing" -ne 0 ]; then exit 1; fi
        echo "All expected build artifacts present."

  bundle-size:
    runs-on: ubuntu-latest

    env:
      # Maximum allowed growth of the JS build output relative to the PR base, in kilobytes.
      MAX_GROWTH_KB: 150

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Build base
      run: |
        git checkout --detach ${{ github.event.pull_request.base.sha }}
        npm ci
        rm -rf dist
        npm run build:js
        echo "BASE_KB=$(du -sk dist | cut -f1)" >> "$GITHUB_ENV"

    - name: Build PR head
      run: |
        git checkout --detach ${{ github.sha }}
        npm ci
        rm -rf dist
        npm run build:js
        echo "HEAD_KB=$(du -sk dist | cut -f1)" >> "$GITHUB_ENV"

    - name: Compare sizes
      run: |
        growth=$((HEAD_KB - BASE_KB))
        echo "Base build: ${BASE_KB} kB"
        echo "PR build:   ${HEAD_KB} kB (${growth} kB change)"
        if [ "$growth" -gt "$MAX_GROWTH_KB" ]; then
          echo "::error::Build size grew by ${growth} kB (limit: ${MAX_GROWTH_KB} kB). Check for large assets or dependencies pulled into the bundle."
          exit 1
        fi
