name: i18n - Collect English Keys

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: i18n-english-keys
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Configure git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Extract English translation keys
      run: npx i18next-cli extract --sync-primary

    - name: Open English keys PR
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        git add src/assets/locales/en-US
        if git diff --cached --quiet; then
          echo "No English translation key changes."
          exit 0
        fi
        BR=i18n/english-keys
        git checkout -B "$BR"
        git commit -m "i18n: collect English translation keys"
        git push -f origin "$BR"
        if [ -z "$(gh pr list --head "$BR" --state open --json number --jq '.[0].number // empty')" ]; then
          gh pr create --base main --head "$BR" \
            --title "i18n: collect English keys" \
            --body "Collected English translation keys from source with i18next-cli extract."
        fi
