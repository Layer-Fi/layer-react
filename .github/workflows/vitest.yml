name: Vitest

on:
  push:

permissions:
  contents: read

jobs:
  vitest:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Vitest
      run: npm test -- --run
